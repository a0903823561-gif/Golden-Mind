<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>智慧超市</title>
  <link rel="stylesheet" href="style.css">
  <script src="market.js" defer></script>
  <style>
    /* 說明區塊樣式，與記憶花園一致 */
    #instruction {
      text-align: center;
      margin: 20px;
      padding: 20px;
      border: 2px solid #0c99f7;
      border-radius: 10px;
      background-color: #242729;
      color: #FFD700;
    }
    #controls, #game-container, #result {
      display: none; /* 初始隱藏，按下開始遊戲後才顯示 */
    }
  </style>
</head>
<body>
  <h1>🛒 智慧超市</h1>
  <p>根據購物清單，快速找到正確商品！</p>

  <!-- 遊戲說明區 -->
  <div id="instruction">
    <h2>🎮 遊戲說明</h2>
    <p>選擇難度後，系統會顯示購物清單🧾。<br>
       請記住清單中的商品🛒，遊戲開始後商品會從上方掉落。<br>
       點擊正確的商品🛒即可收集，錯誤❌三次或時間結束遊戲失敗。<br>
       完成所有清單商品即可過關⭕！</p>
    <button onclick="showGame()">開始遊戲</button>
  </div>

  <!-- 難度選擇按鈕 -->
  <div id="controls">
    <button onclick="startSupermarketGame('easy')">簡單模式</button>
    <button onclick="startSupermarketGame('medium')">中等模式</button>
    <button onclick="startSupermarketGame('hard')">困難模式</button>
    <button onclick="startSupermarketGame('expert')">專家模式</button>
  </div>

  <!-- 主遊戲區 -->
  <div id="game-container">
    <div id="main-area">
      <p id="shopping-list">購物清單會顯示在這裡</p>
      <p id="progress">進度會顯示在這裡</p>
      <div id="timer-bar"><div id="timer-progress"></div></div>
      <div id="supermarket-board"></div>
      <p id="result"></p>
      <button id="menu-btn" onclick="goBackMenu()">返回選單</button>
    </div>

    <div id="sidebar">
      <h2>已購買</h2>
      <ul id="collected-list">
        <li>尚未購買</li>
      </ul>
    </div>
  </div>

  <script>
    function showGame() {
      document.getElementById("instruction").style.display = "none";
      document.getElementById("controls").style.display = "block";
      document.getElementById("game-container").style.display = "flex";
    }
  </script>
</body>
</html>
